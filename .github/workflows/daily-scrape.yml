name: Daily Scrape
# scraper is unable to run on vercel's corn schedule. 

on:
  schedule:
    # Runs every 6 hours, offset by 3h from the Vercel cron (0 */6 * * *)
    # so one of the two systems always fires within 3h of a potential failure.
    - cron: '0 3,9,15,21 * * *'
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Run nightly scrapers
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEOCODE_API_KEY: ${{ secrets.GEOCODE_API_KEY }}
          EVENTBRITE_API_KEY: ${{ secrets.EVENTBRITE_API_KEY }}
          LUMA_API_KEY: ${{ secrets.LUMA_API_KEY }}
          EVENTFINDA_USERNAME: ${{ secrets.EVENTFINDA_USERNAME }}
          EVENTFINDA_PASSWORD: ${{ secrets.EVENTFINDA_PASSWORD }}
          EVENTFINDA_QUERY: ${{ secrets.EVENTFINDA_QUERY }}
          GITHUB_ACTIONS: 'true'
        run: npm run scrape:nightly

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Nightly scrape failed. Check the scraper_runs table in Supabase for per-source details."
          echo "Triggered by: ${{ github.event_name }}"
          echo "Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
